<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/Styles.css">
    <link rel="stylesheet" href="../CSS/Navbar.css">
    <link rel="stylesheet" href="../CSS/Footer.css">
    <link rel="stylesheet" href="../CSS/permanences.css">
    <title>Permanences</title>
</head>
<body>
    <!-- Header -->
    <div id="navbar"></div>
    <script defer src="../JS/navbar.js"></script>

    <h2>Calendar with clickable permanences</h2>
    
    <div id="calendar-container">
        <div id="calendar-header"></div>
        <div id="calendar-grid"></div>
        <div id="info-panel" class="hidden">
            <ul id="info-list"></ul>
            <button id="inscription-btn">Inscription</button>
        </div>
    </div>

    <div id="form-container">
        <h3>Ask for a permanence</h3>
        <form id="permanence-form">
            <label>Date within a month: <select id="date-select"></select></label><br>
            <label>Start time: <select id="start-time"></select></label><br>
            <label>End time: <select id="end-time"></select></label><br>
            <label>Course:</label>
            <select id="course-select">
                <option value="TI402">TI402</option>
                <option value="TI403">TI403</option>
                <option value="TI404">TI404</option>
            </select>            
            <button type="submit">Submit</button>
            <small>(Only possible if there's an available teacher)</small>
        </form>
    </div>

    <div id="custom-alert" class="modal-overlay hidden">
    <div class="modal-content">
        <p id="modal-text"></p>
        <button id="close-alert">Got it! :3</button>
    </div>
    </div>

    <script src="../JS/Permanences.js"></script>
    <!-- Footer -->
    <div id="footer"></div>
    <script defer src="../JS/Footer.js"></script>
</body>
</html>
