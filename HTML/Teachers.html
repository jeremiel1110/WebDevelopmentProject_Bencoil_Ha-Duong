<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachers</title>

    <link rel="stylesheet" href="../CSS/Styles.css">
    <link rel="stylesheet" href="../CSS/Navbar.css">
    <link rel="stylesheet" href="../CSS/Footer.css">
    <link rel="stylesheet" href="../CSS/Teachers.css">
</head>
<body>
    <div id="navbar"></div>
    <script defer src="../JS/Navbar.js"></script>

   <main class="teachers-page">
    <h1 class="page-title">Our Faculty</h1>
    <div class="tables-container">
        <section class="table-section">
            <h2>Permanent Teachers</h2>
            <table class="teacher-table">
                <thead>
                    <tr><th>Name</th><th>Expertise</th><th>Profile</th></tr>
                </thead>
                <tbody id="permanent-list">
                    </tbody>
            </table>
        </section>

        <section class="table-section">
            <h2>Researcher-Teachers</h2>
            <table class="teacher-table">
                <thead>
                    <tr><th>Name</th><th>Research</th><th>Publications</th></tr>
                </thead>
                <tbody id="researcher-list">
                    </tbody>
            </table>
        </section>
    </div>
</main>
<div class="after-main-space"></div>

<script src="../JS/Teachers.js"></script>

    <div id="footer"></div>
    <script defer src="../JS/Footer.js"></script>
</body>
</html>
